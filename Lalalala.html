<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukrainian Reader</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  line-height: 1.6;
}

/* Prevent iPhone text selection issues */
.ukword {
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

body {
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

/* Vocabulary sidebar */
#sidebar {
  position: fixed;
  right: -100%;
  top: 0;
  width: 90vw;
  height: 100%;
  background: white;
  overflow-y: auto;
  transition: right 0.3s;
  z-index: 2000;
  padding: 15px;
}

#sidebar.open {
  right: 0;
}

/* Popup styling */
.popup {
  position: absolute;
  background: white;
  border: 1px solid #ccc;
  padding: 10px;
  display: none;
  z-index: 1000;
  max-width: 90vw;
}
</style>
</head>

<body>

<button id="vocabBtn">📚 Vocabulary</button>

<div id="sidebar"></div>

<p>
<span class="ukword">Життя</span> — це <span class="ukword">любов</span> і <span class="ukword">біль</span>.
</p>

<script>
// ---------------- DATA ----------------
const dictionary = {
  "життя": "life",
  "любов": "love",
  "біль": "pain"
};

const cache = JSON.parse(localStorage.getItem('uk_cache') || '{}');
const saved = JSON.parse(localStorage.getItem('uk_saved') || '[]');

// ---------------- NORMALIZE ----------------
function normalize(word){
  let w = word.toLowerCase().trim();
  w = w.replace(/[.,!?…]/g, '');
  const endings = ["ами","ями","ові","еві","ого","ому","ими","ій","ий","а","у","і","о","е","я","ю","ь"];
  for (let end of endings) {
    if (w.endsWith(end) && w.length > end.length + 2) {
      w = w.slice(0, -end.length);
      break;
    }
  }
  return w;
}

// ---------------- TRANSLATE ----------------
async function translate(text){
  const key = text.trim();

  if(dictionary[key]) return dictionary[key];

  const norm = normalize(key);
  if(dictionary[norm]) return dictionary[norm];

  if(cache[key]) return cache[key];

  const r = await fetch(
    'https://translate.googleapis.com/translate_a/single?client=gtx&sl=uk&tl=en&dt=t&q='
    + encodeURIComponent(key)
  );
  const d = await r.json();
  const t = d[0].map(x=>x[0]).join('');

  cache[key] = t;
  cache[norm] = t;
  localStorage.setItem('uk_cache', JSON.stringify(cache));

  return t;
}

// ---------------- SAVE WORD ----------------
function saveWord(word, translation, btn){
  if(!saved.some(x => x.word === word)){
    saved.push({word, translation});
    localStorage.setItem('uk_saved', JSON.stringify(saved));
    btn.innerText = "✅ Saved!";
    renderVocab();
    setTimeout(() => btn.innerText = "Save", 1200);
  } else {
    btn.innerText = "Already saved";
  }
}

// ---------------- VOCAB PANEL ----------------
function renderVocab(){
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = "<h2>Saved Words</h2>";

  saved.forEach(item => {
    const div = document.createElement('div');
    div.innerHTML = `<b>${item.word}</b> — ${item.translation}`;
    sidebar.appendChild(div);
  });
}

document.getElementById('vocabBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  renderVocab();
});

// ---------------- POPUPS ----------------
const wordPopup = document.createElement("div");
const sentencePopup = document.createElement("div");

wordPopup.className = "popup";
sentencePopup.className = "popup";

document.body.appendChild(wordPopup);
document.body.appendChild(sentencePopup);

// ---------------- INTERACTION ----------------
let pressTimer = null;
let ignoreClick = false;

document.querySelectorAll('.ukword').forEach(el => {

  // HOLD → sentence
  el.addEventListener('touchstart', () => {
    pressTimer = setTimeout(async () => {
      ignoreClick = true;

      const text = el.closest('p').innerText;
      const tr = await translate(text);

      const r = el.getBoundingClientRect();

      sentencePopup.style.display = 'block';
      sentencePopup.style.left = '10px';
      sentencePopup.style.top = (window.scrollY + r.bottom + 20) + 'px';

      sentencePopup.innerHTML = tr;

    }, 400);
  });

  el.addEventListener('touchend', () => {
    clearTimeout(pressTimer);
  });

  // TAP → word
  el.addEventListener('click', async (e) => {
    e.stopPropagation();

    // If popup open → just close
    if(wordPopup.style.display === 'block' || sentencePopup.style.display === 'block'){
      wordPopup.style.display = 'none';
      sentencePopup.style.display = 'none';
      return;
    }

    if(ignoreClick){
      ignoreClick = false;
      return;
    }

    const word = el.textContent;
    const tr = await translate(word);
    const r = el.getBoundingClientRect();

    wordPopup.style.display = 'block';
    wordPopup.style.left = (window.scrollX + r.left) + 'px';
    wordPopup.style.top = (window.scrollY + r.bottom + 10) + 'px';

    wordPopup.innerHTML =
      `<b>${word}</b><br>${tr}
       <hr>
       <button onclick="saveWord('${word}', '${tr}', this)">Save</button>`;
  });
});

// ---------------- CLOSE POPUPS ----------------
document.addEventListener('click', () => {
  wordPopup.style.display = 'none';
  sentencePopup.style.display = 'none';
});
</script>

</body>
</html>
